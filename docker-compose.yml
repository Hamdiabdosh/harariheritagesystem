services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qirsmezgeb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qirsmezgeb_dev}
      POSTGRES_DB: ${POSTGRES_DB:-qirsmezgeb}
    volumes:
      - qirsmezgeb_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-qirsmezgeb} -d ${POSTGRES_DB:-qirsmezgeb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      POSTGRES_USER: ${POSTGRES_USER:-qirsmezgeb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qirsmezgeb_dev}
      POSTGRES_DB: ${POSTGRES_DB:-qirsmezgeb}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      MEDIA_PATH: /app/media
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - qirsmezgeb_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

volumes:
  qirsmezgeb_pgdata:
  qirsmezgeb_media:
