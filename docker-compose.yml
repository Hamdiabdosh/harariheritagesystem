services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qirsmezgeb
      POSTGRES_PASSWORD: qirsmezgeb_dev
      POSTGRES_DB: qirsmezgeb
    ports:
      - "5434:5432"
    volumes:
      - qirsmezgeb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qirsmezgeb -d qirsmezgeb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qirsmezgeb_pgdata:
